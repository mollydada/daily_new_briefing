name: Daily News Briefing

on:
  schedule:
    # UTC 23:00 = 北京时间 07:00（次日）
    - cron: '0 23 * * *'
  workflow_dispatch:   # 允许手动触发（用于测试）

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许 push 回仓库

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic duckduckgo-search

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_briefing.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只 add 当日生成的两个文件
          TODAY=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')
          git add "news_briefing_${TODAY}.html" "news_briefing_${TODAY}.md" 2>/dev/null || true
          git diff --staged --quiet \
            && echo "No new files to commit" \
            || git commit -m "briefing: ${TODAY}"
          git push
